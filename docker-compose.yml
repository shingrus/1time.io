## Deploy with pre-built images from GHCR (no build required)
## Usage:
##   cp .env.example .env
##   # Edit .env: set APP_HOSTNAME to your domain
##   docker compose up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "no"
      - --dir
      - /data
      - --dbfilename
      - dump.rdb
    volumes:
      - ${DATA_DIR:-./data}:/data

  backend:
    image: ghcr.io/shingrus/1time-backend:latest
    restart: unless-stopped
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDISHOST: redis:6379
      REDISPASS: ""
      FILE_STORAGE_DIR: /data/files
    volumes:
      - ${DATA_DIR:-./data}:/data
    depends_on:
      - redis

  web:
    image: ghcr.io/shingrus/1time-web:latest
    restart: unless-stopped
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-1time.io}
      NGINX_PORT: 8080
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:8080"
