# Legacy redirect: onetimelink.me → 1time.io

server {
    server_name onetimelink.me;
    server_tokens off;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/onetimelink.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onetimelink.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 301 permanent redirect — browsers cache this, search engines transfer ranking
    return 301 https://1time.io$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name onetimelink.me;
    server_tokens off;
    return 301 https://1time.io$request_uri;
}
